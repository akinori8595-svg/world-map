<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界旅行足跡マップ (最終・修正統合版)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <style>
    body { margin: 0; padding: 20px; background-color: #f7fafc; font-family: sans-serif; }
    .container { width: 100%; max-width: 850px; margin: 0 auto; }
    .map-wrapper { width: 100%; height: 500px; background: #bae6fd; border-radius: 16px; overflow: hidden; cursor: grab; }
    .country-polygon { fill: #ffffff; stroke: #94a3b8; stroke-width: 0.5px; cursor: pointer; }
    .list-section { background: white; padding: 15px; border-radius: 10px; margin-top: 20px; }
    .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .list-item { padding: 8px; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 5px; font-size: 12px; }
    .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 999; }
    .modal-content { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; z-index: 1000; }
  </style>
</head>
<body>
<div class="container">
  <h1>🌍 世界旅行足跡マップ</h1>
  <input type="text" id="username-input" placeholder="お名前を入力">
  <button onclick="fetchUserData()">設定ロード</button>
  <div class="map-wrapper" id="map-container"><svg id="world-map-svg" width="100%" height="100%"></svg></div>
  <div class="list-section"><h3>登録済みリスト</h3><div id="data-list" class="list-grid"></div></div>
</div>
<div class="modal-overlay" id="overlay"></div>
<div class="modal-content" id="modal">
  <h3 id="modal-title">国名</h3>
  <label>区分</label><select id="status-select"><option value="visited">訪問済み</option><option value="resident">在住</option></select>
  <label>年</label><input type="text" id="years-input">
  <button onclick="saveData()">保存</button><button onclick="closeModal()">戻る</button>
</div>

<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyj4U0gGbquL5LD-UNVwKzcdW-I734t-rd9QvsE9XwSGkA8CkknkRZ9lLNX5yvbxm-Qzg/exec";
  let masterCountries = [], userGlobalData = {}, currentUsername = "", countryNameMap = {};
  const pastelColors = ["#fca5a5", "#fdba74", "#fcd34d", "#fde047", "#a7f3d0", "#86efac", "#67e8f9", "#7dd3fc", "#93c5fd", "#a5b4fc", "#c084fc", "#f472b6", "#fda4af", "#e2e8f0", "#cbd5e1", "#fbcfe8", "#f59e0b", "#10b981", "#3b82f6", "#6366f1", "#8b5cf6", "#ec4899", "#14b8a6", "#06b6d4"];
  const neighborGroups = {"CA":"US", "US":"CA", "AU":"NZ", "NZ":"AU", "FR":"DE", "DE":"FR", "ES":"PT", "PT":"ES"};

  function getPastelColorForCountry(id) {
     let hash = 0, combined = id + (neighborGroups[id] || "");
     for (let i = 0; i < combined.length; i++) hash = combined.charCodeAt(i) + ((hash << 5) - hash);
     return pastelColors[Math.abs(hash) % pastelColors.length];
  }

  const svg = d3.select("#world-map-svg"), projection = d3.geoOrthographic().scale(225).translate([425, 250]).clipAngle(90);
  const path = d3.geoPath().projection(projection), mapGroup = svg.append("g");

  // スクロール安定化：回転スピードを制御
  svg.call(d3.drag().on("drag", (e) => {
    projection.rotate([projection.rotate()[0] + e.dx * 0.3, projection.rotate()[1] - e.dy * 0.3]);
    svg.selectAll("path").attr("d", path);
  }));

  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(topo => {
    mapGroup.selectAll("path").data(topojson.feature(topo, topo.objects.countries).features).enter().append("path")
      .attr("class", "country-polygon").attr("id", d => "poly-raw-id-" + String(Number(d.id)).padStart(3, '0'))
      .attr("d", path).on("click", (e, d) => {
         let nid = String(Number(d.id)).padStart(3, '0');
         let id = masterCountries.find(c => c.numericId === nid)?.id || nid;
         openModal(id, countryNameMap[id]);
      });
  });

  function fetchUserData() {
    currentUsername = document.getElementById("username-input").value.trim();
    fetch(GAS_API_URL + "?username=" + encodeURIComponent(currentUsername)).then(res => res.json()).then(data => {
      masterCountries = data.countryMaster || [];
      countryNameMap = {}; masterCountries.forEach(c => countryNameMap[c.id] = c.name);
      userGlobalData = data.userVisits || {};
      applyData();
    });
  }

  function applyData() {
    mapGroup.selectAll(".country-polygon").style("fill", "#ffffff");
    const listDiv = document.getElementById("data-list"); listDiv.innerHTML = "";
    
    for (let id in userGlobalData) {
      let nid = masterCountries.find(c => c.id === id.toUpperCase())?.numericId;
      if (id === "US-HI" || nid === "901") nid = "840";
      if (nid) {
        d3.select("#poly-raw-id-" + nid).style("fill", userGlobalData[id].status === 'resident' ? "#3b82f6" : getPastelColorForCountry(id.toUpperCase()));
        listDiv.innerHTML += `<div class="list-item">${countryNameMap[id] || id} (${userGlobalData[id].years})</div>`;
      }
    }
  }

  function saveData() { 
    let status = document.getElementById("status-select").value, years = document.getElementById("years-input").value;
    fetch(GAS_API_URL, {method:"POST", body:JSON.stringify({action:"save", username:currentUsername, regionId:selectedId, status:status, years:years})}).then(() => { closeModal(); fetchUserData(); }); 
  }
  
  function openModal(id, name) { selectedId = id.toUpperCase(); document.getElementById("modal-title").innerText = name || id; document.getElementById("modal").style.display = document.getElementById("overlay").style.display = "block"; }
  function closeModal() { document.getElementById("modal").style.display = document.getElementById("overlay").style.display = "none"; }
</script>
</body>
</html>

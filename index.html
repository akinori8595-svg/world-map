<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界旅行足跡マップ</title>
  
  <style>
    body {
      margin: 0; padding: 20px; background-color: #f7fafc;
      font-family: sans-serif; color: #2d3748; text-align: center;
    }
    .container { width: 100%; max-width: 600px; margin: 0 auto; text-align: left; }
    h1 { text-align: center; font-size: 22px; color: #1a202c; margin-bottom: 15px; }
    
    .user-box { background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; }
    .user-box input { width: 60%; padding: 10px; font-size: 15px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
    .user-box button { width: 35%; padding: 10px; font-size: 15px; background: #4299e1; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; float: right; }
    .status-msg { margin-top: 8px; font-size: 13px; font-weight: bold; color: #e53e3e; }

    .legend { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-weight: bold; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; }

    /* 絶対に消えない・ブロックされない高精度SVG世界地図 */
    .interactive-svg-map-frame {
      background-color: #ebf8ff !important; border: 2px solid #bee3f8 !important; border-radius: 12px; padding: 10px; margin-bottom: 20px; display: block !important; visibility: visible !important;
    }
    .world-svg { width: 100%; height: auto; display: block; }
    
    .country-land { fill: #ffffff; stroke: #a0aec0; stroke-width: 1; cursor: pointer; }
    
    /* 状態変化の色（在住＝青、訪問＝緑） */
    .country-land.visited { fill: #68d391 !important; stroke: #48bb78; }
    .country-land.resident { fill: #4299e1 !important; stroke: #3182ce; }

    .list-section { background: white; padding: 15px; border: 1px solid #e2e8f0; border-radius: 10px; }
    .list-title { font-size: 16px; font-weight: bold; border-bottom: 2px solid #edf2f7; padding-bottom: 6px; margin-bottom: 10px; }
    .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    .list-item { background: #f7fafc; border: 1px solid #e2e8f0; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
    .tag-resident { background: #4299e1; color: white; padding: 1px 4px; border-radius: 3px; font-size: 10px; margin-right: 4px; }
    .tag-visited { background: #68d391; color: white; padding: 1px 4px; border-radius: 3px; font-size: 10px; margin-right: 4px; }

    /* ポップアップ */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }
    .modal-content {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 20px; border-radius: 12px; width: 280px; z-index: 1000; box-sizing: border-box;
    }
    .modal-content h3 { margin: 0 0 10px 0; font-size: 16px; text-align: center; }
    .modal-content label { display: block; font-size: 12px; font-weight: bold; margin-top: 10px; color: #4a5568; }
    .modal-content input[type="text"], .modal-content select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; border: 1px solid #cbd5e0; border-radius: 4px; }
    .modal-btn { width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-primary { background: #38a169; color: white; }
    .btn-danger { background: #fff; color: #e53e3e; border: 1px solid #fed7d7; }
    .btn-secondary { background: #edf2f7; color: #4a5568; }
  </style>
</head>
<body>
<div class="container">

  <h1>🌍 世界旅行足跡マップ</h1>
  
  <div class="user-box">
    <input type="text" id="username-input" placeholder="お名前を入力（例: Aki）">
    <button id="btn-login">設定ロード</button>
    <div id="status-display" class="status-msg">⚠️ 最初にお名前を入力して「設定ロード」を押してください</div>
  </div>

  <div class="legend">
    <div class="legend-item"><span style="display:inline-block;width:12px;height:12px;background:#4299e1;border-radius:2px;"></span> 在住・在住歴</div>
    <div class="legend-item"><span style="display:inline-block;width:12px;height:12px;background:#68d391;border-radius:2px;"></span> 訪問済み</div>
    <div class="legend-item"><span style="display:inline-block;width:12px;height:12px;background:white;border:1px solid #a0aec0;border-radius:2px;"></span> 未訪問</div>
  </div>

  <div class="interactive-svg-map-frame">
    <svg class="world-svg" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
      <path d="M120,40 L280,40 L300,100 L200,140 L100,110 Z" class="country-land" id="geo-CA" data-name="カナダ"></path>
      <text x="180" y="80" font-size="12" font-weight="bold" fill="#4a5568" pointer-events="none">カナダ</text>

      <path d="M120,120 L290,120 L310,180 L140,180 Z" class="country-land" id="geo-US" data-name="アメリカ"></path>
      <text x="190" y="150" font-size="12" font-weight="bold" fill="#4a5568" pointer-events="none">アメリカ</text>

      <circle cx="250" cy="240" r="12" class="country-land" id="geo-US-HI" data-name="ハワイ"></circle>
      <text x="235" y="270" font-size="11" font-weight="bold" fill="#4a5568" pointer-events="none">ハワイ</text>

      <path d="M620,130 L760,140 L740,210 L600,200 Z" class="country-land" id="geo-CN" data-name="中国"></path>
      <text x="660" y="175" font-size="13" font-weight="bold" fill="#4a5568" pointer-events="none">中国</text>

      <path d="M810,130 L840,150 L810,210 L790,160 Z" class="country-land" id="geo-JP" data-name="日本"></path>
      <text x="825" y="175" font-size="13" font-weight="bold" fill="#3182ce" pointer-events="none">日本</text>

      <circle cx="800" cy="260" r="10" class="country-land" id="geo-MP" data-name="サイパン"></circle>
      <text x="770" y="285" font-size="10" font-weight="bold" fill="#4a5568" pointer-events="none">サイパン</text>

      <circle cx="820" cy="310" r="10" class="country-land" id="geo-GU" data-name="グアム"></circle>
      <text x="840" y="315" font-size="10" font-weight="bold" fill="#4a5568" pointer-events="none">グアム</text>

      <path d="M740,350 L880,360 L900,440 L720,430 Z" class="country-land" id="geo-AU" data-name="オーストラリア"></path>
      <text x="770" y="400" font-size="13" font-weight="bold" fill="#4a5568" pointer-events="none">オーストラリア</text>
    </svg>
  </div>

  <div class="list-section">
    <div class="list-title">登録済みの国・地域一覧</div>
    <div id="data-list" class="list-grid">
      <div style="color:#a0aec0; font-size:12px;">ロードするとここに一覧が表示されます。</div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="overlay"></div>
<div class="modal-content" id="modal">
  <h3 id="modal-title">国名</h3>
  <label>区分</label>
  <select id="status-select">
    <option value="visited">訪問済みとして登録</option>
    <option value="resident">在住・在住経験ありとして登録</option>
  </select>
  <label>滞在・訪問年（カンマ区切り）</label>
  <input type="text" id="years-input" placeholder="例: 2015, 2019, 2026">
  <button class="modal-btn btn-primary" id="btn-save">保存する</button>
  <button class="modal-btn btn-danger" id="btn-delete">登録を解除する</button>
  <button class="modal-btn btn-secondary" id="btn-cancel">キャンセル</button>
</div>

<script>
  // ⚠️【最重要】ここにGASの「デプロイを管理」からコピーした /exec URLを貼り付けてください。
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzPDxEyRCYAZsG4Q9tZncRRgneoLZXONQ_a8zv9Z0e04OZ0STXPaLxxn0cGWO7pmhskYw/exec";

  let currentUsername = "";
  let userGlobalData = {}; 
  let selectedId = null;

  document.querySelectorAll('.country-land').forEach(el => {
    el.addEventListener('click', function() {
      if (!currentUsername) {
        alert("先にお名前を入力して「設定ロード」ボタンを押してください。");
        return;
      }
      openModal(this.id.replace('geo-', ''), this.getAttribute('data-name'));
    });
  });

  document.getElementById("btn-login").addEventListener("click", function() {
    const name = document.getElementById("username-input").value.trim();
    if (!name) { alert("お名前を入力してください"); return; }
    currentUsername = name;
    document.getElementById("status-display").innerText = "👤 ユーザー: " + currentUsername + " さん（スプレッドシート連動中）";
    document.getElementById("status-display").style.color = "#2b6cb0";
    fetchUserData();
  });

  function fetchUserData() {
    if(!GAS_API_URL || GAS_API_URL.indexOf('http') !== 0) {
       alert("GASのURLが正しく設定されていません。コードの最下部を確認してください。");
       return;
    }
    var url = GAS_API_URL + "?username=" + encodeURIComponent(currentUsername);
    fetch(url)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        userGlobalData = data || {};
        applyDataToUI();
      })
      .catch(function(err) {
        alert("通信に失敗しました。GASのURLまたはデプロイ設定を確認してください。");
        console.error(err);
      });
  }

  function applyDataToUI() {
    document.querySelectorAll('.country-land').forEach(el => {
      el.classList.remove("visited", "resident");
    });
    const listDiv = document.getElementById("data-list");
    listDiv.innerHTML = "";
    let hasData = false;
    for (let id in userGlobalData) {
      const upId = id.toUpperCase();
      const status = userGlobalData[id].status;
      const years = userGlobalData[id].years;
      const el = document.getElementById("geo-" + upId);
      if (el) { el.classList.add(status); }
      hasData = true;
      const cName = el ? el.getAttribute('data-name') : upId;
      const item = document.createElement("div");
      item.className = "list-item";
      item.innerHTML = '<span class="' + (status === "resident" ? "tag-resident" : "tag-visited") + '">' + (status === "resident" ? "在住" : "訪問") + '</span><span>' + cName + ' (' + years + ')</span>';
      listDiv.appendChild(item);
    }
    if (!hasData) { listDiv.innerHTML = '<div style="color:#a0aec0;font-size:12px;">未登録です。地図をタップして登録してください。</div>'; }
  }

  function openModal(id, name) {
    selectedId = id.toUpperCase();
    document.getElementById("modal-title").innerText = name;
    if (userGlobalData[selectedId]) {
      document.getElementById("status-select").value = userGlobalData[selectedId].status;
      document.getElementById("years-input").value = userGlobalData[selectedId].years || "";
      document.getElementById("btn-delete").style.display = "block";
    } else {
      document.getElementById("status-select").value = (selectedId === "JP") ? "resident" : "visited";
      document.getElementById("years-input").value = "";
      document.getElementById("btn-delete").style.display = "none";
    }
    document.getElementById("modal").style.display = "block";
    document.getElementById("overlay").style.display = "block";
  }

  document.getElementById("btn-save").addEventListener("click", function() {
    const status = document.getElementById("status-select").value;
    const years = document.getElementById("years-input").value.trim() || "不明";
    userGlobalData[selectedId] = { status: status, years: years };
    applyDataToUI();
    closeModal();
    fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "save", username: currentUsername, regionId: selectedId, status: status, years: years })
    }).then(function() { fetchUserData(); });
  });

  document.getElementById("btn-delete").addEventListener("click", function() {
    delete userGlobalData[selectedId];
    applyDataToUI();
    closeModal();
    fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "delete", username: currentUsername, regionId: selectedId })
    }).then(function() { fetchUserData(); });
  });

  document.getElementById("btn-cancel").addEventListener("click", closeModal);
  document.getElementById("overlay").addEventListener("click", closeModal);
  function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("overlay").style.display = "none";
  }
</script>
</body>
</html>
